<c-col xs="12">
  <c-card class="mb-4">
    <c-card-body>
      
      <!-- GUMB ZA DODAVANJE ARTIKLA -->
      <button
        *ngIf="isSuperuser"
        cButton
        color="secondary"
        class="buttonDodaj"
        (click)="toggleModal()">
        Novi artikl
      </button>

      <!-- MODAL ZA DODAVANJE -->
      <c-modal [visible]="visible">
        <c-modal-header>
          <h5 cModalTitle>Dodaj novi artikl</h5>
          <button cButtonClose (click)="toggleModal()"></button>
        </c-modal-header>
        <c-modal-body>

          <form cForm>
            <!-- NAZIV -->
            <div class="mb-3">
              <label for="naziv">Naziv:</label>
              <input
                id="naziv"
                name="naziv"
                type="text"
                class="form-control"
                [(ngModel)]="naziv">
            </div>
            <!-- CIJENA -->
            <div class="mb-3">
              <label for="cijena">Cijena:</label>
              <input
                id="cijena"
                name="cijena"
                type="number"
                class="form-control"
                [(ngModel)]="cijena">
            </div>
          </form>
        </c-modal-body>
        <c-modal-footer>
          <button cButton color="secondary" (click)="toggleModal()">
            Zatvori
          </button>
          <button cButton color="primary" (click)="spremiArtikl()">
            Spremi
          </button>
        </c-modal-footer>
      </c-modal>

      <!-- MODAL ZA POTVRDU BRISANJA -->
      <c-modal [visible]="potvrdaVisible">

        <c-modal-header>
          <h5 cModalTitle>Potvrda brisanja</h5>
          <button cButtonClose (click)="zatvoriPotvrdu()"></button>
        </c-modal-header>

        <c-modal-body>
          <p>Jeste li sigurni da želite obrisati ovaj artikl?</p>
        </c-modal-body>

        <c-modal-footer>
          <button
            cButton
            color="secondary"
            (click)="zatvoriPotvrdu()">
            Odustani
          </button>

          <button
            cButton
            color="danger"
            (click)="potvrdiBrisanje()">
            Obriši
          </button>
        </c-modal-footer>

      </c-modal>

      <!-- TABLICA ARTIKALA -->
      <table
        cTable
        [hover]="true"
        color="dark"
        class="mt-4">

        <thead>
          <tr>
            <th>#</th>
            <th>Naziv</th>
            <th>Šifra</th>
            <th>Cijena</th>
            <th style="width: 60px;"></th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let a of artikli; index as i">
            <th>{{ i + 1 }}</th>
            <td>{{ a.naziv }}</td>
            <td>{{ a.sifra }}</td>
            <td>{{ a.cijena }}</td>

            <td>
              <img
                *ngIf="isSuperuser"
                src="assets/images/trash.png"
                alt="Obriši"
                style="cursor: pointer; width: 20px;"
                (click)="otvoriPotvrdu(a)">
            </td>
          </tr>

          <!-- Ako nema artikala -->
          <tr *ngIf="artikli.length === 0">
            <td colspan="5" class="text-center">
              Nema artikala za prikaz.
            </td>
          </tr>
        </tbody>

      </table>

    </c-card-body>
  </c-card>
</c-col>
